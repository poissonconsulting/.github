# Back-compat shim: forwards the ~78 fledge-bump callers still pinned to the
# .yml path to the canonical fledge-bump.yaml reusable workflow. permissions:
# write-all does not escalate -- the calling package workflow's own permissions
# cap the effective token. Delete once every caller references fledge-bump.yaml@v1.

name: fledge-bump

on:
  workflow_call:
    inputs:
      r-version:
        description: R version used to run fledge.
        type: string
        default: release
      pr-branch:
        description: Branch name used for the release-path bump PR.
        type: string
        default: fledge-bump

permissions: write-all

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/fledge-bump.yaml@v1
    with:
      r-version: ${{ inputs.r-version }}
      pr-branch: ${{ inputs.pr-branch }}
    secrets: inherit
