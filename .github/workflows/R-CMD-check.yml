# Back-compat shim: forwards callers still pinned to the .yml path to the
# canonical R-CMD-check.yaml reusable workflow. Permissions must match the
# caller's minimal grant -- a reusable that requests more than the caller
# grants is rejected at startup. Delete once every caller references
# R-CMD-check.yaml@v1.

name: R-CMD-check

on:
  workflow_call:
    inputs:
      tier:
        type: string
        default: unimportant
      jags:
        type: boolean
        default: false
      tex:
        type: boolean
        default: false
      private:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/R-CMD-check.yaml@v1
    with:
      tier: ${{ inputs.tier }}
      jags: ${{ inputs.jags }}
      tex: ${{ inputs.tex }}
      private: ${{ inputs.private }}
    secrets: inherit
