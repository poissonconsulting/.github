# Back-compat shim: forwards the ~78 fledge-tag-on-merge callers still pinned to
# the .yml path to the canonical fledge-tag-on-merge.yaml reusable workflow.
# Permissions must match the caller's minimal grant -- a reusable that requests
# more than the caller grants is rejected at startup. Delete once every caller
# references fledge-tag-on-merge.yaml@v1.

name: fledge-tag-on-merge

on:
  workflow_call:
    inputs:
      r-version:
        description: R version used to run fledge.
        type: string
        default: release

permissions:
  contents: write

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/fledge-tag-on-merge.yaml@v1
    with:
      r-version: ${{ inputs.r-version }}
    secrets: inherit
