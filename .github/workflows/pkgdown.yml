# Back-compat shim: forwards callers still pinned to the .yml path to the
# canonical pkgdown.yaml reusable workflow. Permissions must match the caller's
# minimal grant -- a reusable that requests more than the caller grants is
# rejected at startup. pkgdown deploys to gh-pages, so it needs contents:write.
# Delete once every caller references pkgdown.yaml@v1.

name: pkgdown

on:
  workflow_call:
    inputs:
      private:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/pkgdown.yaml@v1
    with:
      private: ${{ inputs.private }}
    secrets: inherit
