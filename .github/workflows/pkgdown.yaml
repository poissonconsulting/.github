# Reusable pkgdown build + deploy to gh-pages. Callers must use `secrets: inherit`.
# private=true runs with PRIVATE_ACTIONS_PAT so private dependencies resolve.
# cmdstan=true installs the CmdStan toolchain so articles that fit Stan models via
# cmdstanr (e.g. through smbr2) can compile and sample during the site build.
# cmdstanr itself must arrive through the package's dependency tree.

name: pkgdown

on:
  workflow_call:
    inputs:
      cmdstan:
        type: boolean
        default: false
      private:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ inputs.private && secrets.PRIVATE_ACTIONS_PAT || secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Install CmdStan
        if: ${{ inputs.cmdstan }}
        run: |
          cmdstanr::check_cmdstan_toolchain(fix = TRUE, quiet = TRUE)
          cmdstanr::install_cmdstan(cores = 2, quiet = TRUE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
