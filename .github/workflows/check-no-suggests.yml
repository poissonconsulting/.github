# Back-compat shim: forwards callers still pinned to the .yml path to the
# canonical check-no-suggests.yaml reusable workflow. Permissions must match the
# caller's minimal grant -- a reusable that requests more than the caller
# grants is rejected at startup. Delete once every caller references
# check-no-suggests.yaml@v1.

name: check-no-suggests

on:
  workflow_call:
    inputs:
      private:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/check-no-suggests.yaml@v1
    with:
      private: ${{ inputs.private }}
    secrets: inherit
