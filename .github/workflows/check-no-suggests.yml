# Back-compat shim: forwards callers still pinned to the .yml path to the
# canonical check-no-suggests.yaml reusable workflow. permissions: write-all
# does not escalate -- the calling package workflow's own permissions cap the
# effective token. Delete once every caller references check-no-suggests.yaml@v1.

name: check-no-suggests

on:
  workflow_call:
    inputs:
      private:
        type: boolean
        default: false

permissions: write-all

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/check-no-suggests.yaml@v1
    with:
      private: ${{ inputs.private }}
    secrets: inherit
