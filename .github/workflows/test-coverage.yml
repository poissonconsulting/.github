# Back-compat shim: forwards callers still pinned to the .yml path to the
# canonical test-coverage.yaml reusable workflow. permissions: write-all does
# not escalate -- the calling package workflow's own permissions cap the
# effective token. Delete once every caller references test-coverage.yaml@v1.

name: test-coverage

on:
  workflow_call:
    inputs:
      tex:
        type: boolean
        default: false
      private:
        type: boolean
        default: false

permissions: write-all

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/test-coverage.yaml@v1
    with:
      tex: ${{ inputs.tex }}
      private: ${{ inputs.private }}
    secrets: inherit
