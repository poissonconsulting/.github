# Back-compat shim: forwards callers still pinned to the .yml path to the
# canonical test-coverage.yaml reusable workflow. Permissions must match the
# caller's minimal grant -- a reusable that requests more than the caller
# grants is rejected at startup. Delete once every caller references
# test-coverage.yaml@v1.

name: test-coverage

on:
  workflow_call:
    inputs:
      tex:
        type: boolean
        default: false
      private:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  forward:
    uses: poissonconsulting/.github/.github/workflows/test-coverage.yaml@v1
    with:
      tex: ${{ inputs.tex }}
      private: ${{ inputs.private }}
    secrets: inherit
