# Reusable no-suggests check (CRAN packages): R CMD check with only hard dependencies
# (Depends/Imports/LinkingTo), plus testthat/knitr/rmarkdown. Cache disabled so a cached
# Suggests dependency can't leak in. Callers must use `secrets: inherit`.
# private=true runs with PRIVATE_ACTIONS_PAT so private dependencies resolve.

name: check-no-suggests

on:
  workflow_call:
    inputs:
      private:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check-no-suggests:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ inputs.private && secrets.PRIVATE_ACTIONS_PAT || secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          cache: false
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
