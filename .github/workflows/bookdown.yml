on:
  push:
    branches:
     - main
  pull_request:
    branches:
     - main

name: bookdown

jobs:
  bookdown:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_PAT: ${{ secrets.PRIVATE_ACTIONS_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deb Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpfr-dev libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev libjq-dev gdal-bin libgdal-dev libudunits2-dev libsodium-dev libuv1-dev libglpk-dev libx11-dev cmake

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install LaTex
        uses: r-lib/actions/setup-tinytex@v2

      - name: Cache Renv packages
        uses: actions/cache@v4
        with:
          path: $HOME/.local/share/renv
          key: r-${{ hashFiles('renv.lock') }}
          restore-keys: r-

      - name: Cache bookdown results
        uses: actions/cache@v4
        with:
          path: _bookdown_files
          key: bookdown-${{ hashFiles('**/*Rmd') }}
          restore-keys: bookdown-

      - name: Install packages
        run: |
          R -e 'install.packages("renv")'
          R -e 'install.packages("bookdown")'
          R -e 'renv::restore()'

      - name: Build site
        run: |
          R -e 'bookdown::render_book("index.Rmd", quiet = TRUE)'

      - name: Install npm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Deploy to Netlify
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install netlify-cli -g
          netlify deploy --prod --dir _book
